name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git wget unzip build-essential cmake swig python3-pip python3-venv openjdk-17-jdk

    - name: Set JAVA_HOME and verify
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
        java -version
        echo "Java home set successfully"

    - name: Install Python dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install cython numpy Pillow
        pip install buildozer
        pip list

    - name: Debug environment
      run: |
        source venv/bin/activate
        which python
        which pip
        python --version
        pip --version
        echo "JAVA_HOME: $JAVA_HOME"

    - name: Initialize buildozer
      run: |
        source venv/bin/activate
        buildozer init
        cat buildozer.spec

    - name: Build APK
      run: |
        source venv/bin/activate
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        buildozer android debug 2>&1 | tail -200

    - name: Check for APK
      run: |
        ls -la bin/ 2>/dev/null || echo "bin directory not found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v3
      with:
        name: jjchessai-apk
        path: bin/*.apk