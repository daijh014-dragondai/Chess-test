name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y git wget unzip build-essential cmake swig python3-pip python3-venv openjdk-17-jdk

    - name: Set JAVA_HOME
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

    - name: Create virtual environment
      run: python -m venv venv

    - name: Install Python packages
      run: |
        source venv/bin/activate
        pip install --upgrade pip
        pip install cython numpy Pillow requests opencv-python-headless
        pip install buildozer
        pip list | grep -i buildozer

    - name: Check project structure
      run: |
        echo "=== Project structure ==="
        ls -la
        ls -la src/ 2>/dev/null || echo "src not found"
        ls -la assets/ 2>/dev/null || echo "assets not found"
        ls -la .github/workflows/
        cat buildozer.spec | head -30

    - name: Build APK
      run: |
        source venv/bin/activate
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        echo "=== Starting build ==="
        echo "JAVA_HOME: $JAVA_HOME"
        echo "PATH: $PATH"
        echo "Running buildozer..."
        yes | buildozer android debug 2>&1

    - name: Check for APK
      run: |
        ls -la bin/ 2>/dev/null || echo "bin directory not found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jjchessai-apk
        path: bin/*.apk