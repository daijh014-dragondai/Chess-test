name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y git wget unzip build-essential cmake swig python3-pip python3-venv openjdk-17-jdk

    - name: Set environment variables
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
        echo "$JAVA_HOME/bin" >> $GITHUB_PATH

    - name: Create virtual environment
      run: python -m venv venv

    - name: Install Python packages
      run: |
        source venv/bin/activate
        pip install --upgrade pip
        pip install cython numpy Pillow requests opencv-python-headless
        pip install buildozer
        pip list | grep -i buildozer

    - name: Check project structure
      run: |
        echo "=== Project structure ==="
        ls -la
        ls -la src/ 2>/dev/null || echo "src not found"
        ls -la assets/ 2>/dev/null || echo "assets not found"
        cat buildozer.spec

    - name: Build APK
      run: |
        source venv/bin/activate
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export ANDROID_HOME=/opt/android-sdk
        export PATH=$JAVA_HOME/bin:$PATH
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        mkdir -p $ANDROID_HOME
        
        echo "=== Starting build ==="
        echo "JAVA_HOME: $JAVA_HOME"
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "PATH: $PATH"
        echo "Running buildozer..."
        
        # Run buildozer with license acceptance
        yes | buildozer android debug 2>&1 | tee build_output.log
        
        echo "=== Build finished ==="
        echo "Return code: $?"
        
        # Check if build was successful
        if [ $? -ne 0 ]; then
          echo "ERROR: Buildozer failed"
          exit 1
        fi

    - name: Check build output
      run: |
        echo "=== Checking for APK ==="
        ls -la bin/ 2>/dev/null || echo "bin directory not found"
        echo "=== Build log last 200 lines ==="
        tail -200 build_output.log 2>/dev/null || echo "No build log"

    - name: Check APK existence
      id: check_apk
      run: |
        if ls bin/*.apk 1>/dev/null 2>&1; then
          echo "APK_FILE_EXISTS=true" >> $GITHUB_OUTPUT
          echo "APK_PATH=$(ls bin/*.apk | head -n 1)" >> $GITHUB_OUTPUT
          ls -la bin/*.apk
        else
          echo "APK_FILE_EXISTS=false" >> $GITHUB_OUTPUT
          echo "=== ERROR: No APK file found ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found anywhere"
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jjchessai-apk
        path: bin/*.apk
      if: ${{ steps.check_apk.outputs.APK_FILE_EXISTS == 'true' }}
